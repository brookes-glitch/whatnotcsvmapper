<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Whatnot CSV Mapper</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2rem;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: #1a1a1a;
  }

  header p {
    font-size: 14px;
    color: #666;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e5e3de;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.75rem;
  }

  .upload-zone {
    border: 1.5px dashed #ccc;
    border-radius: 10px;
    padding: 2.5rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .upload-zone:hover { background: #faf9f7; border-color: #aaa; }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 32px; margin-bottom: 10px; }
  .upload-label { font-size: 14px; color: #666; }
  .upload-label strong { color: #1a1a1a; }

  .status-bar {
    display: none;
    font-size: 13px;
    color: #555;
    margin-top: 10px;
    padding: 8px 12px;
    background: #f0faf4;
    border-radius: 8px;
    border: 1px solid #c3e6d0;
  }

  .info-note {
    display: none;
    font-size: 12px;
    color: #666;
    padding: 8px 12px;
    background: #f5f4f0;
    border-radius: 8px;
    border: 1px solid #e0ddd8;
    margin-bottom: 1rem;
  }

  .map-headers {
    display: grid;
    grid-template-columns: 1fr 24px 1fr;
    gap: 0 8px;
    margin-bottom: 6px;
    padding: 0 2px;
  }
  .map-headers span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #aaa;
  }

  .map-grid {
    display: grid;
    grid-template-columns: 1fr 24px 1fr;
    gap: 7px 8px;
    align-items: center;
  }

  .col-label {
    font-size: 13px;
    font-weight: 500;
    color: #333;
    padding: 7px 10px;
    background: #faf9f7;
    border-radius: 8px;
    border: 1px solid #e5e3de;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .col-label.has-default { color: #888; font-style: italic; }
  .col-label.locked { color: #bbb; font-style: italic; }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: 6px;
    background: #e8f0fe;
    color: #3b5bdb;
    font-style: normal;
    font-weight: 500;
  }
  .badge-locked {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: 6px;
    background: #f0eeeb;
    color: #bbb;
    border: 1px solid #e0ddd8;
    font-style: normal;
  }

  .arrow {
    text-align: center;
    color: #ccc;
    font-size: 16px;
    user-select: none;
  }

  .map-grid select {
    font-size: 13px;
    padding: 7px 8px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    color: #1a1a1a;
    width: 100%;
    cursor: pointer;
  }
  .map-grid select:focus { outline: 2px solid #3b5bdb; outline-offset: 1px; }

  .locked-label {
    font-size: 13px;
    color: #ccc;
    padding: 7px 10px;
    background: #faf9f7;
    border-radius: 8px;
    border: 1px solid #eee;
    font-style: italic;
  }

  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-download:hover { background: #333; }

  #mappingSection, #downloadSection { display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>Whatnot CSV Mapper</h1>
    <p>Upload your distributor CSV, map the columns, and download a Whatnot-ready file.</p>
  </header>

  <div class="card" id="uploadCard">
    <div class="step-label">Step 1 — Upload distributor CSV</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".csv" />
      <div class="upload-icon">📄</div>
      <div class="upload-label"><strong>Click to choose</strong> or drag & drop your distributor CSV</div>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <div class="card" id="mappingSection">
    <div class="step-label">Step 2 — Map columns to Whatnot fields</div>
    <div class="info-note" id="infoNote"></div>
    <div class="map-headers">
      <span>Whatnot field</span>
      <span></span>
      <span>Your column</span>
    </div>
    <div class="map-grid" id="mapGrid"></div>
  </div>

  <div class="card" id="downloadSection">
    <div class="step-label">Step 3 — Export</div>
    <button class="btn-download" onclick="generateCSV()">
      ↓ Download Whatnot CSV
    </button>
  </div>

</div>

<script>
const WHATNOT_FIELDS = [
  { name: "Category",         defaultVal: "Comics & Manga", locked: false },
  { name: "Sub Category",     defaultVal: "Modern Comics",  locked: false },
  { name: "Title",            defaultVal: "",               locked: false },
  { name: "Description",      defaultVal: "New and unread. Bagged and boarded.", locked: true, lockedVal: "New and unread. Bagged and boarded." },
  { name: "Quantity",         defaultVal: "",               locked: true  },
  { name: "Type",             defaultVal: "Buy it Now",     locked: false },
  { name: "Price",            defaultVal: "",               locked: false },
  { name: "Shipping Profile", defaultVal: "4-7 oz",         locked: false },
  { name: "Offerable",        defaultVal: "False",          locked: true, lockedVal: "False" },
  { name: "Hazmat",           defaultVal: "Not Hazmat",     locked: false },
  { name: "Condition",        defaultVal: "Very Fine",      locked: false },
  { name: "Cost Per Item",    defaultVal: "",               locked: false },
  { name: "SKU",              defaultVal: "",               locked: false },
  { name: "Image URL 1",      defaultVal: "",               locked: false },
  { name: "Image URL 2",      defaultVal: "",               locked: false },
  { name: "Image URL 3",      defaultVal: "",               locked: false },
  { name: "Image URL 4",      defaultVal: "",               locked: false },
  { name: "Image URL 5",      defaultVal: "",               locked: false },
  { name: "Image URL 6",      defaultVal: "",               locked: false },
  { name: "Image URL 7",      defaultVal: "",               locked: false },
  { name: "Image URL 8",      defaultVal: "",               locked: false },
];

let parsedRows = [];
let inputHeaders = [];
let headerRowIndex = -1;

function parseCSVRaw(text) {
  const lines = text.split(/\r?\n/);
  return lines.map(line => {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  });
}

function findHeaderRow(rows) {
  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const hasTitle = r.some(c => c.toLowerCase() === 'title');
    const hasQty = r.some(c => c.toLowerCase() === 'quantity' || c.toLowerCase().includes('qty'));
    if (hasTitle && hasQty) return i;
  }
  return 0;
}

function autoMatch(inHeaders, fieldName) {
  if (fieldName === 'Price') {
    const retail = inHeaders.find(h => /retail/i.test(h) && !/discount/i.test(h));
    if (retail) return retail;
  }
  const fn = fieldName.toLowerCase().replace(/\s+/g, '');
  for (let h of inHeaders) {
    const hn = h.toLowerCase().replace(/[\s_]+/g, '');
    if (hn === fn || hn.includes(fn) || fn.includes(hn)) return h;
  }
  return '';
}

function processValue(fieldName, val) {
  if (fieldName === 'Price' && val !== '') {
    const num = parseFloat(String(val).replace(/[^0-9.]/g, ''));
    if (!isNaN(num)) return String(Math.ceil(num));
  }
  return val;
}

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const allRows = parseCSVRaw(ev.target.result).filter(r => r.some(c => c !== ''));
    headerRowIndex = findHeaderRow(allRows);
    inputHeaders = allRows[headerRowIndex];
    parsedRows = allRows.slice(headerRowIndex + 1).filter(r => r.some(c => c !== ''));

    const sb = document.getElementById('statusBar');
    sb.style.display = 'block';
    sb.textContent = '✓ ' + file.name + ' — ' + parsedRows.length + ' items loaded.';
    buildMappingUI();
  };
  reader.readAsText(file);
});

const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.background = '#faf9f7'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.background = ''; });
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.style.background = '';
  const file = e.dataTransfer.files[0];
  if (file) { document.getElementById('fileInput').files = e.dataTransfer.files; document.getElementById('fileInput').dispatchEvent(new Event('change')); }
});

function buildMappingUI() {
  const grid = document.getElementById('mapGrid');
  grid.innerHTML = '';

  WHATNOT_FIELDS.forEach(field => {
    const matched = field.locked ? '' : autoMatch(inputHeaders, field.name);
    const hasDefault = field.defaultVal !== '';

    const blankLabel = hasDefault ? `— use default: ${field.defaultVal} —` : '— leave blank —';
    const opts = [`<option value="">${blankLabel}</option>`]
      .concat(inputHeaders.map(h => `<option value="${h.replace(/"/g,'&quot;')}">${h}</option>`))
      .join('');

    const labelDiv = document.createElement('div');
    if (field.locked) {
      labelDiv.className = 'col-label locked';
      const lockBadge = field.lockedVal ? 'locked value' : 'always blank';
      labelDiv.innerHTML = field.name + '<span class="badge-locked">' + lockBadge + '</span>';
    } else {
      labelDiv.className = 'col-label' + (hasDefault ? ' has-default' : '');
      labelDiv.title = hasDefault ? 'Default: ' + field.defaultVal : '';
      labelDiv.innerHTML = field.name + (hasDefault ? '<span class="badge">default</span>' : '');
    }

    const arrowDiv = document.createElement('div');
    arrowDiv.className = 'arrow';
    arrowDiv.textContent = '→';

    grid.appendChild(labelDiv);
    grid.appendChild(arrowDiv);

    if (field.locked) {
      const lockedEl = document.createElement('div');
      lockedEl.className = 'locked-label';
      lockedEl.textContent = field.lockedVal ? field.lockedVal : '— always blank —';
      grid.appendChild(lockedEl);
    } else {
      const sel = document.createElement('select');
      sel.id = 'map_' + field.name.replace(/\s+/g, '_');
      sel.innerHTML = opts;
      sel.value = matched;
      grid.appendChild(sel);
    }
  });

  const note = document.getElementById('infoNote');
  if (headerRowIndex > 0) {
    note.style.display = 'block';
    note.textContent = 'ℹ Skipped ' + headerRowIndex + ' metadata rows at the top. Reading ' + parsedRows.length + ' items from row ' + (headerRowIndex + 2) + ' onward.';
  }

  document.getElementById('mappingSection').style.display = 'block';
  document.getElementById('downloadSection').style.display = 'block';
}

function escapeCSV(val) {
  if (val === null || val === undefined) return '';
  const s = String(val);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function generateCSV() {
  const mapping = {};
  WHATNOT_FIELDS.forEach(field => {
    if (field.locked) { mapping[field.name] = null; return; }
    const sel = document.getElementById('map_' + field.name.replace(/\s+/g, '_'));
    mapping[field.name] = sel ? sel.value : '';
  });

  const headerLine = WHATNOT_FIELDS.map(f => escapeCSV(f.name)).join(',');
  const dataLines = parsedRows.map(row => {
    return WHATNOT_FIELDS.map(field => {
      if (field.locked) return escapeCSV(field.lockedVal || '');
      const srcCol = mapping[field.name];
      if (srcCol) {
        const idx = inputHeaders.indexOf(srcCol);
        const raw = idx >= 0 && idx < row.length ? row[idx] : '';
        const val = processValue(field.name, raw !== '' ? raw : field.defaultVal);
        return escapeCSV(val);
      }
      return escapeCSV(field.defaultVal);
    }).join(',');
  });

  const csvContent = [headerLine, ...dataLines].join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'whatnot_upload.csv';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}
</script>
</body>
</html>
